<!doctype html>
<html>
  <head>
    <title>Generated Password</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="container">
      <span class="eyebrow">// generator</span>
      <h1>Generated Password</h1>
      <p class="subtitle">Copy this password and check its strength</p>

      <div class="card">
        <label>Your Password</label>
        <!-- Display generated password in mono font for readability -->
        <div class="generated-password">{{ password }}</div>

        <div class="divider"></div>

        <!-- Send directly to strength checker! -->
        <form action="/results" method="POST">
          <input type="hidden" name="password" value="{{ password }}" />
          <button type="submit">Check Its Strength</button>
        </form>

        <!-- Save password to file form -->
        <form action="/save" method="POST">
          <!-- Hidden field passes password to save route -->
          <input type="hidden" name="password" value="{{ password }}" />
          <button type="submit" class="save-btn">Save to File</button>
        </form>

        <!-- Show success message if password was just saved -->
        {% if saved %}
        <p class="save-success">Password saved to file!</p>
        {% endif %}
      </div>

      <a href="/" class="back-link">Go back</a>
    </div>
  </body>
</html>
